name: prek Autoupdate
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hooks:
    name: Update prek Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Check weekly update window
        id: weekly
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]] || [[ "$(date -u +%u)" == "1" ]]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Repository
        if: steps.weekly.outputs.should_update == 'true'
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        if: steps.weekly.outputs.should_update == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install prek
        if: steps.weekly.outputs.should_update == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: prek

      - name: Run prek auto-update
        if: steps.weekly.outputs.should_update == 'true'
        id: prek
        run: |
          set -euo pipefail
          body_file="$GITHUB_WORKSPACE/prek-autoupdate-body.md"
          {
            echo "Automated update of \`prek\` hooks."
            echo
            echo '```text'
            prek auto-update --cooldown-days 7 2>&1
            echo '```'
          } | tee "$body_file"

      - name: Create Pull Request
        if: steps.weekly.outputs.should_update == 'true'
        uses: peter-evans/create-pull-request@v8
        id: cpr
        with:
          commit-message: 'chore: update prek hooks'
          title: 'Bump prek Hooks'
          branch: chore/prek-updates
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          labels: dependencies
          delete-branch: true
          body-path: prek-autoupdate-body.md
          add-paths: |
            prek.toml

      - name: Close extra auto-generated PRs
        if: steps.weekly.outputs.should_update == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          BODY_MARKER: Automated update of `prek` hooks.
          GITHUB_TOKEN: ${{ github.token }}
          KEEP_PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          python .github/scripts/cleanup_prek_update_branches.py \
            --repository "$REPOSITORY" \
            --branch chore/prek-updates \
            --branch-prefix chore/prek-updates \
            --label-name dependencies \
            --author-login 'github-actions[bot]' \
            --body-marker "$BODY_MARKER" \
            --keep-pr-number "$KEEP_PR_NUMBER" \
            --close-stale-prs \
            --delete-stale-branches \
            --delete-merged-branches

      - name: Close stale prek update PRs
        if: steps.weekly.outputs.should_update == 'true' && steps.cpr.outputs.pull-request-number == ''
        env:
          BODY_MARKER: Automated update of `prek` hooks.
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          python .github/scripts/cleanup_prek_update_branches.py \
            --repository "$REPOSITORY" \
            --branch chore/prek-updates \
            --branch-prefix chore/prek-updates \
            --label-name dependencies \
            --author-login 'github-actions[bot]' \
            --body-marker "$BODY_MARKER" \
            --close-stale-prs \
            --delete-stale-branches \
            --delete-merged-branches

  nightly-cleanup:
    name: Nightly Cleanup
    needs: update-hooks
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Close stale prek update PRs
        env:
          BODY_MARKER: Automated update of `prek` hooks.
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          python .github/scripts/cleanup_prek_update_branches.py \
            --repository "$REPOSITORY" \
            --branch chore/prek-updates \
            --branch-prefix chore/prek-updates \
            --label-name dependencies \
            --author-login 'github-actions[bot]' \
            --body-marker "$BODY_MARKER" \
            --keep-latest-open-pr \
            --close-stale-prs \
            --delete-stale-branches \
            --delete-merged-branches
